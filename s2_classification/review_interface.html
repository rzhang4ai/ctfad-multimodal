<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTFAD — 全量分类审核</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #1a1a1a; }

/* ── 顶部 ── */
.topbar {
  position: sticky; top: 0; z-index: 200;
  background: #1a1a2e; color: white;
  padding: 0 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.topbar-main {
  display: flex; align-items: center; justify-content: space-between;
  height: 52px;
}
.topbar h1 { font-size: 15px; font-weight: 600; }
.topbar-stats { display: flex; gap: 16px; font-size: 12px; opacity: 0.85; }
.stat-item { display: flex; flex-direction: column; align-items: center; }
.stat-val { font-size: 16px; font-weight: 700; line-height: 1; }
.stat-lbl { font-size: 10px; opacity: 0.7; margin-top: 2px; }
.progress-bar { height: 3px; background: #e94560; transition: width 0.3s; }

/* ── 工具栏 ── */
.toolbar {
  background: white; border-bottom: 1px solid #e5e7eb;
  padding: 10px 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.btn {
  padding: 6px 14px; border: none; border-radius: 6px;
  font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,0.12); }
.btn-file   { background: #f3f4f6; color: #374151; }
.btn-export { background: #1a1a2e; color: white; }
.btn-tab    { background: #f3f4f6; color: #6b7280; border: 1px solid #e5e7eb; }
.btn-tab.active { background: #1a1a2e; color: white; border-color: #1a1a2e; }
.divider { width: 1px; height: 24px; background: #e5e7eb; margin: 0 4px; }

/* ── 主内容 ── */
.container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }
.section { margin-bottom: 32px; }
.section-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 2px solid #e5e7eb;
}
.section-title { font-size: 15px; font-weight: 700; }
.section-count {
  background: #f3f4f6; color: #6b7280;
  padding: 2px 10px; border-radius: 20px; font-size: 12px;
}
.section-desc { font-size: 12px; color: #9ca3af; margin-left: auto; }

/* ── 批量确认区：缩略图墙 ── */
.thumb-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px;
}
.thumb-card {
  position: relative; border-radius: 8px; overflow: hidden;
  background: white; border: 2px solid #e5e7eb;
  cursor: pointer; transition: all 0.15s;
  aspect-ratio: 1;
}
.thumb-card:hover { border-color: #94a3b8; transform: scale(1.02); }
.thumb-card.selected { border-color: #22c55e; }
.thumb-card.deselected { border-color: #f97316; opacity: 0.6; }
.thumb-card.expanded { border-color: #3b82f6; }

.thumb-img {
  width: 100%; height: 100%; object-fit: cover;
  display: block;
}
.thumb-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.75));
  padding: 4px 5px 5px;
}
.thumb-label {
  font-size: 9px; font-weight: 700; color: white;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.thumb-check {
  position: absolute; top: 5px; right: 5px;
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid white; background: rgba(0,0,0,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: white;
}
.thumb-card.selected .thumb-check { background: #22c55e; border-color: #22c55e; }
.thumb-card.deselected .thumb-check { background: #f97316; border-color: #f97316; }

/* 展开的单张详情（点击缩略图后） */
.thumb-detail {
  display: none;
  grid-column: 1 / -1;
  background: #f8fafc; border: 1px solid #e2e8f0;
  border-radius: 10px; padding: 16px;
  margin-top: -4px;
}
.thumb-detail.visible { display: grid; grid-template-columns: 200px 1fr; gap: 16px; }
.detail-img { width: 100%; border-radius: 6px; object-fit: contain; max-height: 200px; }
.detail-info { display: flex; flex-direction: column; gap: 8px; }
.detail-id { font-size: 11px; color: #94a3b8; font-family: monospace; }
.detail-labels { display: flex; gap: 8px; flex-wrap: wrap; }
.label-badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; color: white;
}
.detail-text {
  font-size: 11px; color: #64748b; line-height: 1.6;
  border-left: 2px solid #cbd5e1; padding-left: 8px;
  max-height: 60px; overflow: hidden;
}
.detail-actions { display: flex; gap: 8px; margin-top: auto; flex-wrap: wrap; }
.btn-approve { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-approve:hover, .btn-approve.active { background: #22c55e; color: white; }
.btn-reject  { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-reject:hover, .btn-reject.active { background: #f97316; color: white; }
.correction-select {
  padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 6px;
  font-size: 12px; background: white; cursor: pointer; min-width: 200px;
}

/* 批量操作栏 */
.batch-bar {
  background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px;
  padding: 10px 16px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.batch-bar .info { font-size: 13px; color: #166534; flex: 1; }
.btn-batch-approve {
  background: #22c55e; color: white; border: none;
  padding: 8px 20px; border-radius: 6px; font-size: 13px;
  font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.btn-batch-approve:hover { background: #16a34a; }
.btn-select-all, .btn-deselect-all {
  background: white; color: #374151; border: 1px solid #d1d5db;
  padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
}

/* ── 逐条审核区 ── */
.careful-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
.careful-card {
  background: white; border-radius: 12px; overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  border: 2px solid transparent; transition: border-color 0.2s;
}
.careful-card.approved { border-color: #22c55e; }
.careful-card.corrected { border-color: #f97316; }
.careful-card.skipped  { border-color: #a855f7; opacity: 0.75; }

.careful-img {
  width: 100%; height: 200px; object-fit: contain;
  background: #fafafa; cursor: pointer; border-bottom: 1px solid #f0f0f0;
}
.card-body { padding: 12px 14px; }
.card-meta { font-size: 11px; color: #94a3b8; font-family: monospace; margin-bottom: 8px; }
.card-labels { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; flex-wrap: wrap; }
.card-reason { font-size: 11px; color: #9ca3af; font-style: italic; margin-bottom: 8px; max-height: 32px; overflow: hidden; }
.card-text { font-size: 11px; color: #6b7280; line-height: 1.5; border-left: 2px solid #e5e7eb; padding-left: 8px; margin-bottom: 10px; max-height: 48px; overflow: hidden; }
.card-source { font-size: 10px; color: #d1d5db; margin-bottom: 8px; }

.review-btns { display: flex; gap: 8px; margin-bottom: 8px; }
.btn-card-approve { flex:1; padding:7px; background:#dcfce7; color:#16a34a; border:1px solid #bbf7d0; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s; }
.btn-card-approve:hover, .btn-card-approve.active { background:#22c55e; color:white; border-color:#22c55e; }
.btn-card-correct { flex:1; padding:7px; background:#fff7ed; color:#ea580c; border:1px solid #fed7aa; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s; }
.btn-card-correct:hover, .btn-card-correct.active { background:#f97316; color:white; border-color:#f97316; }

.correction-area { display:none; margin-top:6px; }
.correction-area.visible { display:block; }
.correction-area select { width:100%; padding:7px 10px; border:1px solid #d1d5db; border-radius:6px; font-size:12px; background:white; cursor:pointer; }

/* 来源标记 */
.source-tag {
  display:inline-block; font-size:9px; padding:1px 6px; border-radius:8px; font-weight:600;
}
.source-sandbox   { background:#ede9fe; color:#7c3aed; }
.source-model     { background:#f0f9ff; color:#0369a1; }

/* ── 灯箱 ── */
.lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:1000; align-items:center; justify-content:center; }
.lightbox.active { display:flex; }
.lightbox img { max-width:90vw; max-height:90vh; object-fit:contain; border-radius:4px; }
.lightbox-close { position:absolute; top:20px; right:24px; color:white; font-size:28px; cursor:pointer; }

/* ── 空状态 ── */
.empty { text-align:center; padding:60px; color:#9ca3af; font-size:14px; }

/* ── 类别颜色 ── */
.lc-arrangement   { background:#e94560; }
.lc-arrangement_photo    { background:#e94560; }
.lc-arrangement_drawing  { background:#f43f5e; }
.lc-arrangement_painting { background:#fb7185; }
.lc-vessel        { background:#8b5cf6; }
.lc-vessel_photo  { background:#8b5cf6; }
.lc-vessel_drawing { background:#a78bfa; }
.lc-vessel_painting { background:#c4b5fd; }
.lc-plants        { background:#22c55e; }
.lc-plants_photo  { background:#22c55e; }
.lc-plants_drawing { background:#4ade80; }
.lc-plants_painting { background:#86efac; }
.lc-photograph    { background:#3b82f6; }
.lc-decoration    { background:#3b82f6; }
.lc-scene_photo   { background:#60a5fa; }
.lc-historical_artifact { background:#93c5fd; }
.lc-diagram       { background:#f59e0b; }
.lc-step_diagram  { background:#f59e0b; }
.lc-layout_diagram { background:#fbbf24; }
.lc-structure_diagram { background:#fcd34d; }
.lc-other         { background:#9ca3af; }
</style>
</head>
<body>

<!-- 顶部 -->
<div class="topbar">
  <div class="topbar-main">
    <h1>🌸 CTFAD 全量分类审核</h1>
    <div class="topbar-stats">
      <div class="stat-item"><div class="stat-val" id="statTotal">—</div><div class="stat-lbl">总计</div></div>
      <div class="stat-item"><div class="stat-val" id="statBatch">—</div><div class="stat-lbl">批量区</div></div>
      <div class="stat-item"><div class="stat-val" id="statCareful">—</div><div class="stat-lbl">逐条区</div></div>
      <div class="stat-item"><div class="stat-val" id="statDone">0</div><div class="stat-lbl">已完成</div></div>
      <div class="stat-item"><div class="stat-val" id="statPct">0%</div><div class="stat-lbl">进度</div></div>
    </div>
  </div>
  <div class="progress-bar" id="progressBar" style="width:0%"></div>
</div>

<!-- 工具栏 -->
<div class="toolbar">
  <input type="file" id="fileInput" accept=".jsonl" style="font-size:13px">
  <div class="divider"></div>
  <button class="btn btn-tab active" id="tabAll" onclick="switchTab('all')">全部</button>
  <button class="btn btn-tab" id="tabBatch" onclick="switchTab('batch')">批量确认区</button>
  <button class="btn btn-tab" id="tabCareful" onclick="switchTab('careful')">逐条审核区</button>
  <div class="divider"></div>
  <button class="btn btn-export" onclick="exportResults()">⬇ 导出审核结果</button>
</div>

<!-- 主内容 -->
<div class="container" id="mainContainer">
  <div class="empty">请载入 <code>review_ready.jsonl</code></div>
</div>

<!-- 灯箱 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">✕</span>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
// ── 数据 ──────────────────────────────────────────────────
let allRecords = [];
let reviews    = {};   // { gid: { status, human_fine_label } }
let expandedThumb = null;
let currentTab = 'all';

const FINE_LABELS = [
  "arrangement_photo","arrangement_drawing","arrangement_painting",
  "vessel_photo","vessel_drawing","vessel_painting",
  "plants_photo","plants_drawing","plants_painting",
  "decoration","scene_photo","historical_artifact",
  "step_diagram","layout_diagram","structure_diagram",
  "other"
];

// ── 文件载入 ──────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    allRecords = ev.target.result.trim().split('\n')
      .filter(Boolean).map(l => JSON.parse(l));

    // 预填 skip 条目（沙盒已审核）
    reviews = {};
    allRecords.forEach(r => {
      if (r.review_tier === 'skip') {
        reviews[r.global_pair_id] = {
          status: 'approved',
          human_fine_label: r.fine_label,
          source: 'sandbox'
        };
      }
    });

    updateStats();
    render();
  };
  reader.readAsText(file);
});

// ── 统计 ──────────────────────────────────────────────────
function updateStats() {
  const batch   = allRecords.filter(r => r.review_tier === 'batch').length;
  const careful = allRecords.filter(r => r.review_tier === 'careful').length;
  const skip    = allRecords.filter(r => r.review_tier === 'skip').length;
  const total   = allRecords.length;

  const doneReviews = Object.values(reviews).filter(r => r.status !== 'pending').length;
  const pct = total > 0 ? Math.round(doneReviews / (total - skip) * 100) : 0;

  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statBatch').textContent   = batch;
  document.getElementById('statCareful').textContent = careful;
  document.getElementById('statDone').textContent    = doneReviews;
  document.getElementById('statPct').textContent     = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
}

// ── Tab 切换 ──────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  ['all','batch','careful'].forEach(t => {
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1))
      .classList.toggle('active', t === tab);
  });
  render();
}

// ── 渲染 ──────────────────────────────────────────────────
function render() {
  const container = document.getElementById('mainContainer');
  if (allRecords.length === 0) {
    container.innerHTML = '<div class="empty">请载入 <code>review_ready.jsonl</code></div>';
    return;
  }

  const batchRecs   = allRecords.filter(r => r.review_tier === 'batch');
  const carefulRecs = allRecords.filter(r => r.review_tier === 'careful');
  const skipRecs    = allRecords.filter(r => r.review_tier === 'skip');

  let html = '';

  if (currentTab !== 'careful') {
    html += renderBatchSection(batchRecs);
  }
  if (currentTab !== 'batch') {
    html += renderCarefulSection(carefulRecs);
  }
  if (currentTab === 'all') {
    html += renderSkipSection(skipRecs);
  }

  container.innerHTML = html;
}

// ── 批量确认区 ────────────────────────────────────────────
function renderBatchSection(records) {
  const approvedCount = records.filter(r => reviews[r.global_pair_id]?.status === 'approved').length;
  const remaining = records.length - approvedCount;

  return `
<div class="section" id="section-batch">
  <div class="section-header">
    <span class="section-title">🔲 批量确认区</span>
    <span class="section-count">${records.length} 条</span>
    <span class="section-desc">arrangement / diagram / plants — 沙盒准确率 80%+，缩略图扫描后一键确认</span>
  </div>

  <div class="batch-bar">
    <div class="info">已确认 ${approvedCount} / ${records.length} 条，剩余 ${remaining} 条</div>
    <button class="btn-select-all" onclick="batchSelectAll()">全部选中</button>
    <button class="btn-deselect-all" onclick="batchDeselectAll()">全部取消</button>
    <button class="btn-batch-approve" onclick="batchApprove()">✅ 一键批准所有选中</button>
  </div>

  <div class="thumb-grid" id="thumbGrid">
    ${records.map(r => renderThumb(r)).join('')}
  </div>
</div>`;
}

function renderThumb(r) {
  const gid    = r.global_pair_id;
  const rev    = reviews[gid];
  const label  = r.fine_label || r.coarse_label;
  const imgSrc = `file://${r.image_path}`;
  const isExp  = expandedThumb === gid;

  let stateClass = rev
    ? (rev.status === 'approved' ? 'selected' : 'deselected')
    : '';
  let checkSymbol = rev
    ? (rev.status === 'approved' ? '✓' : '✕')
    : '';

  return `
<div class="thumb-card ${stateClass} ${isExp ? 'expanded' : ''}"
     id="thumb-${gid}" onclick="toggleThumb('${gid}')">
  <img class="thumb-img" src="${imgSrc}"
       onerror="this.style.background='#f3f4f6'"
       alt="${gid}">
  <div class="thumb-overlay">
    <div class="thumb-label">${label}</div>
  </div>
  <div class="thumb-check">${checkSymbol}</div>
</div>
${isExp ? renderThumbDetail(r) : `<div id="detail-${gid}" style="display:none"></div>`}`;
}

function renderThumbDetail(r) {
  const gid    = r.global_pair_id;
  const rev    = reviews[gid];
  const label  = r.fine_label || r.coarse_label;
  const imgSrc = `file://${r.image_path}`;
  const text   = [r.caption, r.context].filter(Boolean).join(' | ').substring(0, 200);
  const approveActive = rev?.status === 'approved' ? 'active' : '';
  const rejectActive  = rev?.status === 'corrected' ? 'active' : '';
  const corrVisible   = rev?.status === 'corrected' ? 'visible' : '';
  const selectedVal   = rev?.human_fine_label || '';

  const opts = FINE_LABELS.map(l =>
    `<option value="${l}" ${selectedVal===l?'selected':''}>${l}</option>`).join('');

  return `
<div class="thumb-detail visible" id="detail-${gid}" style="grid-column:1/-1">
  <img class="detail-img" src="${imgSrc}"
       onclick="openLightbox('${imgSrc}')"
       onerror="this.style.background='#f3f4f6'" alt="">
  <div class="detail-info">
    <div class="detail-id">${gid} · ${r.book_id}</div>
    <div class="detail-labels">
      <span class="label-badge lc-${label}">${label}</span>
      <span style="font-size:11px;color:#9ca3af">粗: ${r.coarse_label}</span>
    </div>
    ${text ? `<div class="detail-text">${text}</div>` : ''}
    <div class="detail-actions">
      <button class="btn-approve ${approveActive}" onclick="thumbApprove('${gid}')">✅ 正确</button>
      <button class="btn-reject ${rejectActive}" onclick="thumbReject('${gid}')">❌ 纠错</button>
      <select class="correction-select ${corrVisible}" id="corr-${gid}"
              onchange="thumbSetCorr('${gid}',this.value)"
              ${rev?.status!=='corrected'?'style="display:none"':''}>
        <option value="">— 选正确细分类 —</option>${opts}
      </select>
    </div>
  </div>
</div>`;
}

function toggleThumb(gid) {
  if (expandedThumb === gid) {
    expandedThumb = null;
  } else {
    // 默认选中（如果还没有审核状态）
    if (!reviews[gid]) {
      reviews[gid] = { status: 'approved', human_fine_label: null };
    }
    expandedThumb = gid;
  }
  render();
  updateStats();
}

function thumbApprove(gid) {
  const r = allRecords.find(x => x.global_pair_id === gid);
  reviews[gid] = { status: 'approved', human_fine_label: r?.fine_label };
  render(); updateStats();
}
function thumbReject(gid) {
  reviews[gid] = { status: 'corrected', human_fine_label: '' };
  render(); updateStats();
}
function thumbSetCorr(gid, val) {
  if (!reviews[gid]) reviews[gid] = { status: 'corrected', human_fine_label: '' };
  reviews[gid].human_fine_label = val;
  updateStats();
}

function batchSelectAll() {
  allRecords.filter(r => r.review_tier === 'batch').forEach(r => {
    if (!reviews[r.global_pair_id] || reviews[r.global_pair_id].status !== 'corrected') {
      reviews[r.global_pair_id] = { status: 'approved', human_fine_label: r.fine_label };
    }
  });
  render(); updateStats();
}
function batchDeselectAll() {
  allRecords.filter(r => r.review_tier === 'batch').forEach(r => {
    delete reviews[r.global_pair_id];
  });
  render(); updateStats();
}
function batchApprove() {
  const selected = allRecords.filter(r =>
    r.review_tier === 'batch' &&
    reviews[r.global_pair_id]?.status === 'approved'
  );
  selected.forEach(r => {
    reviews[r.global_pair_id] = { status: 'approved', human_fine_label: r.fine_label };
  });
  render(); updateStats();
  alert(`✅ 已批准 ${selected.length} 条`);
}

// ── 逐条审核区 ────────────────────────────────────────────
function renderCarefulSection(records) {
  return `
<div class="section" id="section-careful">
  <div class="section-header">
    <span class="section-title">🔍 逐条审核区</span>
    <span class="section-count">${records.length} 条</span>
    <span class="section-desc">vessel / photograph / other — 准确率较低，逐条判断</span>
  </div>
  <div class="careful-grid">
    ${records.map(r => renderCarefulCard(r)).join('')}
  </div>
</div>`;
}

function renderCarefulCard(r) {
  const gid    = r.global_pair_id;
  const rev    = reviews[gid];
  const label  = r.fine_label || r.coarse_label;
  const imgSrc = `file://${r.image_path}`;
  const text   = [r.caption, r.context].filter(Boolean).join(' | ').substring(0, 160);

  const stateClass    = rev ? rev.status : '';
  const approveActive = rev?.status === 'approved' ? 'active' : '';
  const correctActive = rev?.status === 'corrected' ? 'active' : '';
  const corrVisible   = rev?.status === 'corrected' ? 'visible' : '';
  const selectedVal   = rev?.human_fine_label || '';

  const opts = FINE_LABELS.map(l =>
    `<option value="${l}" ${selectedVal===l?'selected':''}>${l}</option>`).join('');

  const sourceTag = r.label_source === 'human_sandbox'
    ? '<span class="source-tag source-sandbox">沙盒标注</span>'
    : '<span class="source-tag source-model">模型预测</span>';

  return `
<div class="careful-card ${stateClass}" id="card-${gid}">
  <img class="careful-img" src="${imgSrc}"
       onclick="openLightbox('${imgSrc}')"
       onerror="this.style.background='#f3f4f6';this.style.height='120px'" alt="">
  <div class="card-body">
    <div class="card-meta">${gid} · ${r.book_id} ${sourceTag}</div>
    <div class="card-labels">
      <span class="label-badge lc-${label}">${label}</span>
      <span style="font-size:11px;color:#9ca3af">粗: ${r.coarse_label}</span>
    </div>
    ${r.fine_reason ? `<div class="card-reason">${r.fine_reason.substring(0,100)}</div>` : ''}
    ${text ? `<div class="card-text">${text}</div>` : ''}
    <div class="review-btns">
      <button class="btn-card-approve ${approveActive}" onclick="carefulApprove('${gid}')">✅ 正确</button>
      <button class="btn-card-correct ${correctActive}" onclick="carefulCorrect('${gid}')">❌ 纠错</button>
    </div>
    <div class="correction-area ${corrVisible}" id="ccorr-${gid}">
      <select onchange="carefulSetCorr('${gid}',this.value)">
        <option value="">— 选正确细分类 —</option>${opts}
      </select>
    </div>
  </div>
</div>`;
}

function carefulApprove(gid) {
  const r = allRecords.find(x => x.global_pair_id === gid);
  reviews[gid] = { status: 'approved', human_fine_label: r?.fine_label };
  refreshCarefulCard(gid); updateStats();
}
function carefulCorrect(gid) {
  reviews[gid] = { status: 'corrected', human_fine_label: '' };
  refreshCarefulCard(gid); updateStats();
}
function carefulSetCorr(gid, val) {
  if (!reviews[gid]) reviews[gid] = { status: 'corrected', human_fine_label: '' };
  reviews[gid].human_fine_label = val;
  updateStats();
}
function refreshCarefulCard(gid) {
  const r = allRecords.find(x => x.global_pair_id === gid);
  if (!r) return;
  const el = document.getElementById(`card-${gid}`);
  if (el) el.outerHTML = renderCarefulCard(r);
}

// ── 沙盒跳过区 ───────────────────────────────────────────
function renderSkipSection(records) {
  if (records.length === 0) return '';
  return `
<div class="section">
  <div class="section-header">
    <span class="section-title">⏭ 沙盒已标注（自动跳过）</span>
    <span class="section-count">${records.length} 条</span>
    <span class="section-desc">人工标注结果直接复用，无需审核</span>
  </div>
  <div style="color:#9ca3af;font-size:13px;padding:12px;background:white;border-radius:8px;">
    ${records.map(r => `<span style="margin-right:8px;font-family:monospace;font-size:11px">${r.global_pair_id}</span>`).join('')}
  </div>
</div>`;
}

// ── 灯箱 ─────────────────────────────────────────────────
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

// ── 导出 ─────────────────────────────────────────────────
function exportResults() {
  if (allRecords.length === 0) { alert('请先载入文件'); return; }

  const output = allRecords.map(r => {
    const gid = r.global_pair_id;
    const rev = reviews[gid];
    const finalLabel = rev?.human_fine_label || r.fine_label;
    return {
      global_pair_id:    gid,
      book_id:           r.book_id,
      image_path:        r.image_path,
      image_filename:    r.image_filename,
      page:              r.page,
      caption:           r.caption,
      coarse_label:      r.coarse_label,
      fine_label:        finalLabel,
      label_source:      r.label_source,
      review_tier:       r.review_tier,
      review_status:     rev?.status || 'pending',
      is_corrected:      rev?.status === 'corrected',
      original_fine_label: r.fine_label,
    };
  });

  const pending = output.filter(r => r.review_status === 'pending').length;
  if (pending > 0 && !confirm(`还有 ${pending} 条未审核，确定导出吗？`)) return;

  const blob = new Blob([output.map(r => JSON.stringify(r)).join('\n')], {type:'application/jsonl'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'classified_final.jsonl';
  a.click();
}
</script>
</body>
</html>
